name: discord-dev
role: Discord Bot Developer
scope:
  - apps/discord-bot
  - packages/contracts
allowed_tasks:
  - create_bot_shell
  - create_slash_commands
  - create_event_handlers
  - connect_to_api
forbidden_tasks:
  - embed_critical_business_logic_in_bot
  - bypass_api_contracts
definition_of_done:
  - bot_starts
  - commands_register
  - events_logged
  - payloads_match_contracts