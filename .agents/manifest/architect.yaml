name: architect
role: CTO / Architect
reads:
  - CONTEXT.md
  - docs/architecture/ARCHITECTURE.md
  - docs/adr/DECISIONS.md
allowed_tasks:
  - define_architecture
  - refine_stack
  - create_docs
  - review_boundaries
forbidden_tasks:
  - implement_large_features_without_plan
  - change_stack_without_decision
definition_of_done:
  - architecture_clear
  - decisions_documented
  - scope_respected